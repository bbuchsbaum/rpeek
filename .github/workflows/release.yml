name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.target.os }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            artifact: rpeek-linux-x86_64
          - os: macos-latest
            artifact: rpeek-macos-aarch64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/rpeek dist/${{ matrix.target.artifact }}
          chmod +x dist/${{ matrix.target.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}
